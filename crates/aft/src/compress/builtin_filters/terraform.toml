[filter]
matches = ["terraform"]
description = "Compact Terraform output; preserve plan/apply signals."

[strip]
patterns = [
  '^Refreshing state',
  '^Initializing',
  '^Downloading',
  '^[a-zA-Z_]+\.[a-zA-Z_]+: Refreshing state',
  '^- ',
  '^Provider registry',
  '^Terraform has been successfully initialized',
  '^\s*-+\s*$',
  '^\s*$',
]

[cap]
max_lines = 120
keep = "tail"

[shortcircuit]
when = 'No changes\.'
replacement = "terraform: no changes"
