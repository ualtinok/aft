[filter]
matches = ["make", "gmake"]
description = "Compact GNU make output; short-circuit silent success."

[strip]
patterns = [
  '^make\[\d+\]: Entering directory',
  '^make\[\d+\]: Leaving directory',
  '^make: Entering directory',
  '^make: Leaving directory',
  '^make\[\d+\]: Nothing to be done',
  '^make: Nothing to be done',
]

[truncate]
line_max = 500

[cap]
max_lines = 80
keep = "tail"

[shortcircuit]
when = '^\s*$'
replacement = "make: ok"
